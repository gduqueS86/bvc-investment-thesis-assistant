name: Actualizar Reportes Financieros BVC

on:
  workflow_dispatch:
    inputs:
      empresa:
        description: 'Empresa (ej: ECOPETROL, BANCOLOMBIA)'
        required: true
        default: 'ECOPETROL'
      periodo:
        description: 'Período (ej: 1T2026, 2T2025, Anual2025)'
        required: true
        default: '1T2026'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Run downloader
        run: python downloader.py ${{ inputs.empresa }} ${{ inputs.periodo }}

      - name: Commit new files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pdfs/ data/
          git commit -m "Descarga: ${{ inputs.empresa }} - ${{ inputs.periodo }} - $(date +'%Y-%m-%d')" || echo "No changes"
          git push