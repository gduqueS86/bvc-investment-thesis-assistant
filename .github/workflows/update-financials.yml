name: Actualizar Reportes Financieros BVC

on:
  workflow_dispatch:
    inputs:
      empresa:
        description: 'Empresa (ej: MINEROS, ECOPETROL)'
        required: true
        default: 'MINEROS'
      periodos:
        description: 'Períodos separados por espacio (ej: 1T2026 Anual2025 Anual2024)'
        required: true
        default: '1T2026'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Run downloader
        run: python downloader.py "${{ inputs.empresa }}" ${{ inputs.periodos }}

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pdfs/ || true
          git add data/ || true
          git commit -m "Descarga: ${{ inputs.empresa }} - ${{ inputs.periodos }} ($(date +'%Y-%m-%d %H:%M'))" || echo "No hay cambios nuevos"
          git push || echo "No se pudo hacer push (posiblemente sin cambios)"